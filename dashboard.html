<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kelola Tamu - Nia & Rahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --dark: #0a0a0a; --dark-2: #1a1a1a; }
        body { font-family: 'Jost', sans-serif; background-color: var(--dark); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; }
        .card { background: var(--dark-2); padding: 25px; border-radius: 15px; border: 1px solid rgba(201, 168, 76, 0.2); margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--gold); text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background: var(--gold); color: var(--dark); border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .result-area { margin-top: 20px; display: none; }
        .link-box { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed var(--gold); word-break: break-all; margin-bottom: 15px; color: #ccc; font-size: 0.9rem; }
        .btn-wa { background: #25d366; color: white; padding: 15px; border-radius: 50px; border: none; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .footer { text-align: center; margin-top: 40px; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Guest Manager</h1>
    <div class="card">
        <label>Nama Tamu Undangan</label>
        <input type="text" id="guestName" placeholder="Contoh: Bapak Maju Mundur">
        <label>URL Undangan</label>
        <input type="text" id="baseUrl" value="https://wedding-nia-rahim.vercel.app">
        <button class="btn" onclick="generate()">Generate Link & Pesan</button>
    </div>

    <div id="resultArea" class="result-area card">
        <label>Link Khusus Tamu (Otomatis +):</label>
        <div id="generatedLink" class="link-box"></div>
        <button class="btn-wa" onclick="sendWA()">Kirim WhatsApp Sekarang</button>
    </div>

    <div class="footer">
        DASHBOARD PENGELOLA TAMU<br>
        Digital Invitation By Awal Hasibuan, S.Kom<br>
        © 2026 Nia & Rahim
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('guestName').value.trim();
        let base = document.getElementById('baseUrl').value.trim();
        
        if(!name) return alert("Mohon isi nama tamu!");
        if(base.endsWith('/')) base = base.slice(0,-1);

        // OTOMATIS GANTI SPASI KE + UNTUK LINK AGAR TIDAK TERPUTUS
        const nameWithPlus = name.replace(/\s+/g, '+');
        const finalLink = base + "/?to=" + nameWithPlus;

        document.getElementById('generatedLink').innerText = finalLink;
        document.getElementById('resultArea').style.display = 'block';
    }

    function sendWA() {
        const name = document.getElementById('guestName').value.trim();
        const link = document.getElementById('generatedLink').innerText;
        
        // Sapaan tetap pakai spasi (name), Link di bawah pakai tanda + (link)
        const text = `Yth. Bapak/Ibu/Saudara/i%0A*${name}*%0ADi Tempat%0A---------------------------%0A_Assalamualaikum Wr. Wb._%0ADengan segala kerendahan hati,%0Akami mengundang Bapak/Ibu/Saudara/i dan teman-teman untuk menghadiri acara,%0A=============%0A*Nia %26 Rahim*%0A=============%0A*♥️Save The Date♥️*%0A----------------%0A_Akad Nikah_%0A📅 Tanggal : *13 April 2026*%0A🕘 Pukul : *09:00 s/d Selesai*%0A%0A_Resepsi_%0A📅 Tanggal : *14 April 2026*%0A🕘 Pukul : *09:00 s/d Selesai*%0A_Tempat_%0A🏠 *Desa Ujung Batu, Kecamatan Sosa, Kabupaten Padang Lawas*%0A-----------------%0AUntuk detail acaranya, bisa kunjungi link berikut.👇%0A${link}%0A%0A(Note: Disarankan Menggunakan Browser Chrome)%0A%0AKami sangat berharap Bapak/Ibu/Saudara/i dan teman-teman dapat menghadiri acara tersebut,%0A--------------------------------%0AWassalamualaikum Wr. Wb,%0A🙏 Hormat Kami,%0A_Nia %26 Rahim_`;

        window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
    }
</script>

</body>
</html>
