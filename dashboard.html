<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kelola Tamu - Nia & Rahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --dark: #0a0a0a;
            --dark-2: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { color: var(--gold); text-align: center; margin-bottom: 10px; font-weight: 600; }
        .sub-title { text-align: center; opacity: 0.6; font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 0.1em; }

        .card {
            background: var(--dark-2);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }

        input {
            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: 'Jost', sans-serif;
            font-size: 1rem;
        }

        input:focus { border-color: var(--gold); outline: none; background: #282828; }

        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3); }

        .result-area {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .link-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--gold);
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 15px;
            color: #ccc;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 12px;
        }

        .btn-copy { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-copy:hover { background: rgba(201, 168, 76, 0.1); color: var(--gold); }
        .btn-wa { background: #25d366; color: white; }
        .btn-wa:hover { background: #20ba5a; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        .footer { text-align: center; margin-top: 50px; opacity: 0.4; font-size: 0.75rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Guest Management</h1>
    <p class="sub-title">NIA & RAHIM WEDDING GENERATOR</p>

    <div class="card">
        <label>Nama Tamu Undangan</label>
        <input type="text" id="guestName" placeholder="Contoh: Tuan Oke Gas">

        <label>URL Undangan (Vercel)</label>
        <input type="text" id="baseUrl" value="https://wedding-nia-rahim.vercel.app" placeholder="https://wedding-nia-rahim.vercel.app">

        <button class="btn" onclick="generateLink()">Generate Link & Pesan</button>
    </div>

    <div id="resultArea" class="result-area card">
        <label>Link Khusus Tamu (Klik "Kirim WhatsApp" untuk tes):</label>
        <div id="generatedLink" class="link-box"></div>
        
        <div class="action-btns">
            <button class="btn btn-copy" onclick="copyLink()">Salin Link</button>
            <button class="btn btn-wa" onclick="sendWhatsApp()">Kirim WhatsApp</button>
        </div>
    </div>

    <div class="footer">
        DASHBOARD PENGELOLA TAMU<br>
        Digital Invitation By Awal Hasibuan, S.Kom<br>
        © 2026 Nia & Rahim
    </div>
</div>
