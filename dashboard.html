<script>
    function generateLink() {
        const name = document.getElementById('guestName').value.trim();
        let baseUrl = document.getElementById('baseUrl').value.trim();

        if (name === "" || baseUrl === "") {
            alert("Mohon isi nama tamu dan URL website!");
            return;
        }

        if (baseUrl.endsWith('/')) {
            baseUrl = baseUrl.slice(0, -1);
        }

        // PERBAIKAN: Menggunakan encodeURIComponent untuk menangani spasi secara bersih
        // Lalu memaksa %20 agar tidak berubah jadi +
        const encodedName = encodeURIComponent(name).replace(/%20/g, '%20');
        const finalLink = `${baseUrl}/index.html?to=${encodedName}`;

        document.getElementById('generatedLink').innerText = finalLink;
        document.getElementById('resultArea').style.display = 'block';
    }

    function copyLink() {
        const link = document.getElementById('generatedLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            alert("Link berhasil disalin!");
        });
    }

    function sendWhatsApp() {
        const name = document.getElementById('guestName').value.trim();
        const link = document.getElementById('generatedLink').innerText;
        const guest = name ? name : "Tamu Undangan";

        // PERBAIKAN: Menggunakan encodeURIComponent pada pesan teks 
        // agar karakter khusus & dan Spasi terproses dengan benar oleh WhatsApp
        const message = `Yth. Bapak/Ibu/Saudara/i%0A*${guest}*%0ADi Tempat%0A---------------------------%0A_Assalamualaikum Wr. Wb._%0ADengan segala kerendahan hati,%0Akami mengundang Bapak/Ibu/Saudara/i dan teman-teman untuk menghadiri acara,%0A=============%0A*Jul %26 Muna*%0A=============%0A*♥️Save The Date♥️*%0A----------------%0A*_Resepsi_*%0A📅 Tanggal : *15 April 2026*%0A🕘 Pukul : *09:00 s/d Selesai*%0A_Tempat_%0A🏠 *Desa Papaso II, Kecamatan Sosa Timur, Kabupaten Padang Lawas*%0A-----------------%0A%0AUntuk detail acaranya, bisa kunjungi link berikut.👇%0A${link}%0A%0A(Note: Disarankan Menggunakan Browser Chrome)%0A%0AKami sangat berharap Bapak/Ibu/Saudara/i dan teman-teman dapat menghadiri acara tersebut,%0A--------------------------------%0AWassalamualaikum Wr. Wb,%0A🙏 Hormat Kami,%0A_Jul %26 Muna_`;
        
        window.open(`https://api.whatsapp.com/send?text=${message}`, '_blank');
    }
</script>
